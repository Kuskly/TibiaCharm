<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tibia Charm Analyzer</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    h2 {
      color: #38bdf8;
    }

    textarea {
      width: 100%;
      height: 150px;
      background: #020617;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 10px;
      margin-top: 10px;
    }

    select, input {
      margin-top: 10px;
      padding: 8px;
      background: #020617;
      color: #e2e8f0;
      border: 1px solid #334155;
      width: 100%;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      background: #22c55e;
      border: none;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 16px;
    }

    button:hover {
      background: #16a34a;
    }

    pre {
      margin-top: 20px;
      background: #020617;
      padding: 15px;
      border: 1px solid #334155;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>⚔️ Tibia Charm Analyzer</h2>

<label>📋 Hunt (copie do analyzer do Tibia)</label>
<textarea id="input">
Killed Monsters:
  251x darklight striker
  251x darklight matter
  160x walking pillar
  156x darklight source
</textarea>

<label>✨ Charm Especial</label>
<select id="charmType" onchange="handleCharmChange()">
  <option value="">Nenhum</option>
  <option value="overflux">Overflux</option>
  <option value="overpower">Overpower</option>
</select>

<input id="charmValue" type="number" placeholder="" style="display:none;">

<button onclick="analyze()">Analisar</button>

<pre id="result"></pre>

<!-- 🔥 IMPORTANTE: evita cache -->
<script src="script.js?v=5"></script>

</body>
</html>
